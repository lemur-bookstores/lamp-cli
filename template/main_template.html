<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_TITLE}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .main-title {
            color: #2c3e8c;
            font-weight: 800;
            line-height: 1.1;
        }
        .accent-line {
            height: 4px;
            background-color: #c64c33 !important;
            margin: 20px 0;
        }
        .description {
            color: #6c757d;
            max-width: 450px;
        }
        footer {
            padding: 20px 0;
            border-top: 1px solid #eee;
            color: #6c757d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mb-5 mb-lg-0">
                    <h1 class="main-title">
                        {{SITE_NAME}} <br/>
                        <span class="text-uppercase">{{SITE_TITLE}}</span>
                    </h1>
                    <div class="accent-line"></div>
                    <p class="description">{{DESCRIPTION}}</p>
                    <div class="mt-4">
                        <a href="{{CORPORATE_SITE_URL}}" class="btn btn-primary btn-lg px-4 shadow-sm" style="background-color: #c64c33; color: #ffffff !important; border: none; font-weight: 600;">
                            {{VISIT_CORPORATE_SITE_TEXT}}
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <img src="{{UNDER_CONSTRUCTION_IMAGE_URL}}/vector.png" style="max-width: 400px;" alt="Under Construction Illustration" class="img-fluid">
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center">
        <div class="container">
            <p>&copy; {{CURRENT_YEAR}} All rights reserved, {{CORPORATE_SITE_NAME}}.</p>
        </div>
    </footer>
</body>
</html>
